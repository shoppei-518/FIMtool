<title>FIM採点支援ツール v1.0.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo','Yu Gothic',sans-serif;background:#F0F4F8;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:700px;margin:0 auto}
.hd{background:linear-gradient(135deg,#15803D,#22C55E);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hd .b{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.hd .t{font-weight:700;font-size:14px}
.tabs{display:flex;background:#fff;border-bottom:1px solid #E5E8EB;flex-shrink:0}
.tabs button{flex:1;padding:9px;border:none;cursor:pointer;font-size:10px;font-weight:600;background:#fff;color:#7F8C8D;border-bottom:2px solid transparent;font-family:inherit}
.tabs button.a{background:#F0FDF4;color:#15803D;border-bottom-color:#15803D}
.ct{flex:1;overflow-y:auto;padding:12px}
.msg{display:flex;margin-bottom:10px}
.msg.u{justify-content:flex-end}
.bbl{max-width:88%;padding:10px 14px;font-size:13px;line-height:1.6;white-space:pre-wrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg.u .bbl{background:#15803D;color:#fff;border-radius:14px 14px 4px 14px}
.msg.b .bbl{background:#fff;color:#2C3E50;border-radius:14px 14px 14px 4px}
.ib{padding:8px 12px 12px;background:#fff;border-top:1px solid #E5E8EB;flex-shrink:0}
.ib input{flex:1;border:1px solid #D5DBDB;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;font-family:inherit}
.ib button{width:42px;border-radius:10px;border:none;background:#D5DBDB;color:#fff;font-size:18px;cursor:default}
.ib button.r{background:#15803D;cursor:pointer}
.ibtn{padding:10px 14px;border-radius:10px;border:1px solid #86EFAC;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#15803D;font-family:inherit}
.ibtn:active{background:#F0FDF4}
.ibtn.c{border-color:#F9E79F;color:#7D6608}
.ibtn.d{border-color:#FADBD8;color:#922B21;width:100%}
.ibtn.sc{border-color:#D5DBDB;color:#2C3E50;width:100%;font-weight:400;text-align:left}
.ibtn.sc:active{background:#F0FDF4;border-color:#86EFAC}
.g{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.vg{display:flex;flex-direction:column;gap:6px}
.lb{font-size:12px;color:#5D6D7E;margin-bottom:6px;font-weight:600}
.obtn{padding:10px 14px;border-radius:10px;border:1px solid #D5DBDB;background:#fff;cursor:pointer;font-size:13px;color:#2C3E50;font-family:inherit;text-align:left;width:100%;line-height:1.4}
.obtn:active{background:#F0FDF4;border-color:#86EFAC}
.step{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dot{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.dot.d{background:#D5F5E3;color:#1E8449}
.dot.c{background:#DCFCE7;color:#15803D}
.s7{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.s7 button{width:42px;height:42px;border-radius:10px;border:1px solid #D5DBDB;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;color:#2C3E50}
.s7 button.ok{background:#D5F5E3;color:#1E8449;border-color:#82E0AA}
.s7 button.ng{background:#FADBD8;color:#922B21;border-color:#F1948A}
.s7 button.ans{background:#DCFCE7;color:#15803D;border-color:#86EFAC}
.bar{height:4px;border-radius:2px;background:#E5E8EB;margin-bottom:12px;overflow:hidden}
.bar .fill{height:100%;border-radius:2px;background:#22C55E;transition:width .3s}
input::placeholder{color:#AEB6BF}
</style>

<body>
<div id="app">
<div class="hd">
<div class="b">v1</div>
<div><div class="t">FIM採点支援ツール v1.0.0</div></div>
</div>
<div class="tabs">
<button class="a" onclick="sw('chat')">💬 チャット</button>
<button onclick="sw('items')">📋 項目</button>
<button onclick="sw('scenes')">🎯 場面</button>
<button onclick="sw('flow')">🔀 フロー</button>
<button onclick="sw('quiz')">📝 問題集</button>
</div>
<div class="ct" id="p-chat"><div id="msgs"></div></div>
<div class="ct" id="p-items" style="display:none"></div>
<div class="ct" id="p-scenes" style="display:none"></div>
<div class="ct" id="p-flow" style="display:none"></div>
<div class="ct" id="p-quiz" style="display:none"></div>
<div class="ib" id="ibar">
<div style="font-size:10px;color:#B0B0B0;text-align:center;margin-bottom:4px">⚠️ 患者名や個人情報は入力しないでください</div>
<div style="display:flex;gap:6px">
<input id="ui" placeholder="場面や項目名を入力..." onkeydown="if(event.key==='Enter')sd()">
<button id="sb" onclick="sd()">↑</button>
</div>
</div>
</div>
<script>
var SCENE_DB = [
  // ===== 食事 =====
  { item: "食事", kw: ["常食","食事.*自立","普通に食べ"], score: 7, ex: "常食を自立して食べることができる" },
  { item: "食事", kw: ["箸.*使えない","スプーン.*使用","フォーク"], score: 7, ex: "箸を使えなくても減点されません。スプーン・フォーク使用でも7点" },
  { item: "食事", kw: ["塩分制限","制限食"], score: 7, ex: "塩分制限食は減点されません" },
  { item: "食事", kw: ["配膳","下膳","トレイ"], score: 7, ex: "配膳・下膳は評価対象外です（食べる動作のみ評価）" },
  { item: "食事", kw: ["時間.*かかる","ゆっくり","遅い"], score: 6, ex: "通常の3倍以上時間がかかる場合は6点（修正自立）" },
  { item: "食事", kw: ["自助具","太柄","スプーン.*太い","万能カフ"], score: 6, ex: "自助具の使用は6点（修正自立）" },
  { item: "食事", kw: ["エプロン.*自分","エプロン.*使用"], score: 6, ex: "エプロンの使用は自助具として6点" },
  { item: "食事", kw: ["きざみ","粥","ペースト","ソフト食","ミキサー","食事形態","軟菜"], score: 6, ex: "食事形態の工夫（きざみ・粥・ペースト等）は6点" },

  { item: "食事", kw: ["口腔内.*残渣","残渣.*確認"], score: 4, ex: "口腔内残渣の確認が必要＝4点" },
  { item: "食事", kw: ["食べ残し.*集め","食べこぼし"], score: 4, ex: "食べ残しを集める介助＝4点" },
  { item: "食事", kw: ["すくう.*介助","手.*介助.*すくう"], score: 3, ex: "手を介助して食べ物をすくう＝3点（口には自分で運べる）" },
  { item: "食事", kw: ["口.*運ぶ.*介助","ほとんど.*介助"], score: 2, ex: "途中から口まで運ぶことも含めてほとんど介助＝2点" },
  { item: "食事", kw: ["全介助.*食事","経管栄養","絶食","経管"], score: 1, ex: "食物を口へ運ぶ動作が全介助、経管栄養、絶食＝1点" },
  // 具体例集追加パターン（食事）
  { item: "食事", kw: ["片麻痺.*お茶碗.*持てない","非利き手.*食事可能"], score: 7, ex: "片麻痺で非利き手でお茶碗は持てないが食事可能な場合は7点" },
  { item: "食事", kw: ["胃瘻.*チューブ.*管理"], score: 6, ex: "胃瘻であるがチューブ類を自分で管理している＝6点" },

  { item: "食事", kw: ["半側空間無視.*食器","注意障害.*食器"], score: 4, ex: "半側空間無視で介助者が食器の位置変更→4点、自分で反転→5点" },
  { item: "食事", kw: ["アイスマッサージ","寒冷刺激"], score: 4, ex: "誤嚥防止のアイスマッサージなど寒冷刺激を介助者が行う＝4点" },
  { item: "食事", kw: ["経口.*経管.*併用","3食経口.*水分補給.*経鼻"], score: 1, ex: "経口と経管を併用→低い点数を採用し1点" },
  { item: "食事", kw: ["服薬","薬.*飲む"], score: -1, ex: "食事に服薬動作は含まれません。問題解決で採点します" },
  { item: "食事", kw: ["咀嚼.*嚥下.*誤嚥.*繰り返"], score: -1, ex: "咀嚼・嚥下を行っているが誤嚥を繰り返す場合、嚥下に介入を要する状態のため減点" },

  // ===== 整容 =====
  { item: "整容", kw: ["5項目.*自立","全部.*自立","すべて.*自立"], score: 7, ex: "5項目すべて自立＝7点" },
  { item: "整容", kw: ["電動歯ブラシ.*でなければ","電動歯ブラシ.*必要"], score: 6, ex: "電動歯ブラシでなければならない場合＝6点" },

  { item: "整容", kw: ["入れ歯.*外し","入れ歯.*介助"], score: 4, ex: "入れ歯外してもらうのみ＝4点程度（1項目介助）" },
  { item: "整容", kw: ["奥歯.*磨い"], score: 3, ex: "奥歯を磨いてもらう＝3点相当" },

  { item: "整容", kw: ["口腔ケア.*残留物.*チェック.*介助.*必要"], score: 4, ex: "口腔ケア後残留物の除去に介助が必要＝4点" },
  { item: "整容", kw: ["化粧.*しない女性","4活動.*1.*介助"], score: 4, ex: "化粧をしない女性で残り4活動のうち1活動に介助→75%→4点" },

  // ===== 清拭 =====

function matchScene(query) {
var q = query.toLowerCase().replace(/ｍ/g, 'm');
var scored = [];
  for (var scene of SCENE_DB) {
    let hitCount = 0;
    for (var pattern of scene.kw) {
      try { if (new RegExp(pattern, 'i').test(q)) hitCount++; } catch { if (q.includes(pattern.toLowerCase())) hitCount++; }
    }
    if (hitCount > 0) scored.push({ ...scene, _hits: hitCount });
  }
  scored.sort((a, b) => b._hits - a._hits);
  return scored;
}

function generateResponse(query) {
var q = query;
  let response = "";

  // 1. Check for general principles
var genKw = ["原則","基本","ルール","考え方","全般","共通","フロー","判断基準"];
  if (genKw.some(k => q.includes(k))) {
    response += "📋 FIMの基本原則\n\n";
    GENERAL_PRINCIPLES.forEach((p, i) => { response += `${i + 1}. ${p}\n`; });
    return response;
  }

  // 2. Check for distinction questions
var distinctions = [
    { kw: ["社会的交流","問題解決"], test: () => q.includes("社会的交流") && q.includes("問題解決"),
      ans: "📌 社会的交流と問題解決の区別\n\n■ 社会的交流 → 「迷惑行動」を評価\n  暴言、介護拒否、裸で徘徊、食堂拒否等\n\n■ 問題解決 → 「危険行動」を評価\n  1人で移乗して転倒、Nsコールを押せない等\n\n覚え方：\n  「他者への迷惑か」→ 社会的交流\n  「自分の安全への危険か」→ 問題解決" },
    { kw: ["トイレ動作","トイレ移乗"], test: () => q.includes("トイレ動作") && q.includes("トイレ移乗"),
      ans: "📌 トイレ動作とトイレ移乗の区別\n\n■ トイレ動作 → 衣服の上げ下ろし、お尻を拭く\n  （3動作×各33%）\n\n■ トイレ移乗 → 便座への座る・立つ動作\n  （蓋の開け閉めは評価しない）" },
    { kw: ["失禁","失敗"], test: () => q.includes("失禁") && q.includes("失敗"),
      ans: "📌 失禁と失敗の区別\n\n■ 失禁 ≠ 失敗\n\n■ 失敗 = 尿/便が漏れて衣服や布団が汚れて世話がかかること\n\n■ 失禁しても自分で処理できれば「失敗」ではない\n\n例: リハパン内で失禁→自分でパッド交換→失敗ではない（6点の可能性）\n\n■ 空振りは衣服やシーツを汚さず交換の手間はないため失敗にはならない" },
    { kw: ["歩行","車椅子"], test: () => q.includes("歩行") && q.includes("車椅子") && (q.includes("違") || q.includes("区別") || q.includes("どっち")),
      ans: "📌 歩行と車椅子の選択\n\n■ 入院時の採点は退院時の移動手段（歩行or車椅子）に合わせて行う\n■ 分からない場合は入院時に両方を採点しておく\n■ 車椅子は補助具→自立でも6点で7点にはならない\n\n距離の基準:\n  50M以上歩行/移動できれば → 3〜7点\n  50M未満 → 1〜2点\n  ※但し15M以上自立なら → 5点" },
    { kw: ["安全","配慮"], test: () => q.includes("安全") && q.includes("配慮") && (q.includes("準備") || q.includes("5点") || q.includes("違")),
      ans: "📌 6点「安全性配慮」と5点「準備」の違い\n\n■ 6点（安全性配慮）\n  患者本人が危険に配慮する\n  例：転倒の危険がある患者が壁を利用したり安全に行うための方法を選んでいる\n\n■ 5点（準備・見守り）\n  介助者がそばにいて危険に配慮する\n  例：転倒の危険があるため監視（見守り）を受ける\n\n※ 5点では介助者がそばにいて危険に配慮するが、6点では患者本人が危険に配慮する" },
  ];
  for (var d of distinctions) {
    if (d.test()) return d.ans;
  }

  // 3. Scene-to-score matching (main feature!)
var sceneMatches = matchScene(q);
  if (sceneMatches.length > 0) {
  var best = sceneMatches[0];
    if (best.score === -1) {
      response += `📌 ${best.item}\n\n`;
      response += `💡 ${best.ex}\n`;
    } else {
    var level = SCORE_LEVELS[best.score];
      response += `📌 ${best.item}\n\n`;
      response += `✅ ${best.score}点（${level.name}）\n\n`;
      response += `【判定根拠】\n`;
      response += `${best.ex}\n\n`;
      response += `【${best.score}点（${level.name}）の定義】\n`;
      response += `${level.def}\n`;
    }

    // Show full scale for context
  var itemData = FIM_DATA[best.item];
    if (itemData) {
      response += `\n【${best.item}の全採点基準】\n`;
      for (let s = 7; s >= 1; s--) {
      var lvl = SCORE_LEVELS[s];
      var marker = s === best.score ? "  ← ★該当" : "";
        response += `${s}点(${lvl.name}): ${itemData.scores[s]}${marker}\n`;
      }
      response += `\n※ 原則: スタッフ間で点数が異なる場合や昼夜で異なる場合は低い方の点数を採用`;
      if (itemData.tips && itemData.tips.length > 0) {
        response += `\n\n💡 ポイント\n`;
        itemData.tips.forEach(t => { response += `• ${t}\n`; });
      }
    }
    return response;
  }

  // 4. Item lookup (show full details)
var items = findItemFromQuery(q);
  if (items.length > 0) {
    for (var name of items) {
    var item = FIM_DATA[name];
      response += `📌 ${name}（${item.category}）\n`;
      response += `${item.definition}\n`;
      response += `動作の分け方: ${item.breakdown}\n\n`;
      response += `【採点基準】\n`;
      for (let s = 7; s >= 1; s--) {
      var lvl = SCORE_LEVELS[s];
        response += `${s}点(${lvl.name}): ${item.scores[s]}\n`;
      }
      response += `\n💡 ポイント\n`;
      item.tips.forEach(t => { response += `• ${t}\n`; });
      response += "\n";
    }
    return response.trim();
  }

  // 5. Fallback
  return "該当する情報が見つかりませんでした。\n\n以下のような質問をお試しください：\n• 「社会的交流で暴言がひどい場合は何点？」\n• 「食事でむせの見守りが必要」\n• 「80%洗ってすすぐが乾かせない」\n• 「社会的交流と問題解決の違い」\n• 「安全性配慮と準備の違い」\n• 「FIMの基本原則」\n\nまたは「📋 項目一覧」タブから項目を選択してください。";
}
